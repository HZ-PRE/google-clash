<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clash Switchboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="popup-shell">
  <main class="panel popup-panel">
    <section class="hero">
      <div>
        <p class="eyebrow">Chrome Proxy</p>
        <h1>Clash<br />Switchboard</h1>
      </div>
      <label class="power-switch" title="启用/关闭浏览器代理">
        <input id="enabled" type="checkbox" />
        <span></span>
      </label>
    </section>

    <section class="status-card" id="statusCard">
      <div class="status-dot" id="statusDot"></div>
      <div>
        <strong id="statusTitle">读取中</strong>
        <small id="statusText">正在检测配置</small>
      </div>
    </section>

    <section class="stats-card" id="statsCard">
      <div class="stats-row">
        <div class="stat-item stat-up">
          <span class="stat-label">↑ 上行</span>
          <span class="stat-value" id="statUpload">0 B/s</span>
        </div>
        <div class="stat-item stat-down">
          <span class="stat-label">↓ 下行</span>
          <span class="stat-value" id="statDownload">0 B/s</span>
        </div>
        <div class="stat-item stat-mem">
          <span class="stat-label">内存</span>
          <span class="stat-value" id="statMemory">--</span>
        </div>
      </div>
      <div class="stats-total">
        <small>累计 ↑ <span id="statTotalUp">0 B</span> · ↓ <span id="statTotalDown">0 B</span> · 活跃连接 <span id="statConns">0</span></small>
      </div>
    </section>

    <section class="vpn-card">
      <button id="vpnBtn" class="vpn-btn">启动 VPN</button>
      <button id="stopVpnBtn" class="secondary-btn stop-vpn-btn">停止 VPN</button>
      <p id="vpnMsg" class="hint"></p>
    </section>

    <section class="segmented" aria-label="模式">
      <button data-mode="rule" class="mode-btn">规则</button>
      <button data-mode="global" class="mode-btn">全局</button>
      <button data-mode="direct" class="mode-btn">直连</button>
    </section>

    <section class="quick-row">
      <button id="updateSubPopupBtn" class="secondary-btn">更新订阅</button>
      <button id="allowLanBtn" class="secondary-btn">局域网：关闭</button>
    </section>

    <section class="profile-row">
      <select id="profileSelect" class="profile-select">
        <option value="">-- 配置 Profile --</option>
      </select>
    </section>

    <section class="proxy-groups-section">
      <div class="proxy-groups-toolbar">
        <button id="speedTestAllBtn" class="ghost-btn">全部测速</button>
        <button id="autoSelectAllBtn" class="ghost-btn">全部自动选优</button>
      </div>
      <p class="hint" id="controllerMsg">正在读取代理组...</p>
      <div id="proxyGroupsList"></div>
    </section>

    <footer>
      <button id="optionsBtn" class="link-btn">高级设置</button>
      <button id="clearBtn" class="link-btn danger">清除代理</button>
    </footer>
  </main>
  <script src="clash-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
